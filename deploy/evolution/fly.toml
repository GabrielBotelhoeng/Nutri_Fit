app = "nutrichat-evolution"
primary_region = "gru"

[build]
  image = "evoapicloud/evolution-api:v1.8.7"

[env]
  SERVER_TYPE = "http"
  SERVER_PORT = "8080"
  SERVER_URL = "https://nutrichat-evolution.fly.dev"
  DATABASE_ENABLED = "false"
  REDIS_ENABLED = "false"
  RABBITMQ_ENABLED = "false"
  WEBSOCKET_ENABLED = "false"
  SQS_ENABLED = "false"
  WEBHOOK_GLOBAL_ENABLED = "false"
  AUTHENTICATION_TYPE = "apikey"
  CONFIG_SESSION_PHONE_CLIENT = "NutriChat"
  CONFIG_SESSION_PHONE_NAME = "Chrome"
  QRCODE_COLOR = "#2D5016"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "evolution_data"
  destination = "/evolution/instances"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
